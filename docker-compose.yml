services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env.production
    volumes:
      - db-data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

volumes:
  db-data:
